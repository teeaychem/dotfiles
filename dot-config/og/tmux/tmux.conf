set  -s default-terminal "tmux-256color"
set  -g base-index      0
setw -g pane-base-index 0

set -g status-keys emacs
set -g mode-keys   emacs



set  -g mouse             on
set  -g focus-events      off
setw -g aggressive-resize off
setw -g clock-mode-style  12
set  -g history-limit     100000

set  -g escape-time       5
set  -s escape-time       5

set  -s set-clipboard     on

set  -g renumber-windows on
set  -g base-index       1
setw -g pane-base-index  1

set -g status-interval 5


set -g prefix C-t
unbind C-b
bind-key C-t send-prefix

bind-key | split-window -h
bind-key - split-window -v
unbind '"'
unbind %

set -g display-time 4000  # up display duration
set -g status-interval 5  # 'status-left' and 'status-right' refresh interval
set -g focus-events on

bind-key R run-shell "tmux source-file ${XDG_CONFIG_HOME}/tmux/tmux.conf > /dev/null; \
                      tmux display-message 'Sourced tmux config'"

# tmux plugins / TPM

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_CONFIG_HOME/tmux/plugins"
# # $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/install_plugins
# # $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/update_plugins all

# # ensure
if "test ! -d $XDG_CONFIG_HOME/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TMUX_PLUGIN_MANAGER_PATH/tpm && $TMUX_PLUGIN_MANAGER_PATH/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'

#

set -g @plugin 'sainnhe/tmux-fzf'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

set -g @plugin 'tmux-plugins/tmux-yank'

# tmuxplugin-catppuccin
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_window_tabs_enabled on
set -g @catppuccin_date_time "%H:%M"

# tmuxplugin-resurrect
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '$HOME/.cache/tmux'

# sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-save-interval '10'

# tmuxplugin-better-mouse-mode
set -g @plugin 'nhdaly/tmux-better-mouse-mode'


# init tmux plugin manager, kept at the very bottom of tmux.conf
run '$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm'
