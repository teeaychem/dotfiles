if-shell 'command -v zsh >/dev/null 2>&1' \
  'if-shell "test -x /bin/zsh" "set -g default-shell /bin/zsh" "set -g default-shell /usr/bin/zsh"'

set  -s default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"

set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'

set -g status-keys emacs
set -g mode-keys   emacs

set  -g mouse             on
set  -g aggressive-resize off
set  -g clock-mode-style  24
set  -g history-limit     100000

set  -s escape-time       5

set  -s set-clipboard     on

set  -g renumber-windows on
set  -g base-index       1
setw -g pane-base-index  1

set -g monitor-activity on

# Show messages for an hour
set -g display-time 36000000

set -g prefix C-t
unbind C-b
bind-key C-t send-prefix

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window      -c "#{pane_current_path}"

unbind '"'
unbind %

set -g status-interval 5  # 'status-left' and 'status-right' refresh interval
set -g focus-events on

set -ag update-environment "SSH_TTY"

# Copy selections to the system clipboard without leaving copy-mode.
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'set -g @copy_command "pbcopy"' \
  'if-shell "command -v wl-copy >/dev/null 2>&1" \
     "set -g @copy_command \"wl-copy\"" \
     "if-shell \"command -v xclip >/dev/null 2>&1\" \
        \"set -g @copy_command \\\"xclip -in -selection clipboard\\\"\" \
        \"set -g @copy_command \\\"tmux load-buffer -w -\\\"\""'

bind-key -T copy-mode    M-w               send-keys -X copy-pipe "#{@copy_command}"
bind-key -T copy-mode    C-w               send-keys -X copy-pipe "#{@copy_command}"
bind-key -T copy-mode    y                 send-keys -X copy-pipe "#{@copy_command}"
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe "#{@copy_command}"
bind-key -T copy-mode-vi Enter             send-keys -X copy-pipe "#{@copy_command}"
bind-key -T copy-mode-vi y                 send-keys -X copy-pipe "#{@copy_command}"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "#{@copy_command}"

bind-key R if-shell "test -f ${XDG_CONFIG_HOME}/tmux/tmux.conf" \
             "source-file ${XDG_CONFIG_HOME}/tmux/tmux.conf \; display-message 'Config reloaded!'" \
                 "display-message 'Error: Config file not found!'"

# tmux plugins / TPM

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_CONFIG_HOME/tmux/plugins"
# # $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/install_plugins
# # $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/update_plugins all

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'sainnhe/tmux-fzf'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

# set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @yank_action 'copy-pipe'
# set -g @yank_with_mouse off

# tmuxplugin-catppuccin
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_window_tabs_enabled on
set -g @catppuccin_date_time "%H:%M"

# tmuxplugin-resurrect
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '$HOME/.cache/tmux'

# sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-boot 'off'
set -g @continuum-save-interval '300'

# tmuxplugin-better-mouse-mode
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# https://github.com/tmux-plugins/tpm/blob/master/docs/automatic_tpm_installation.md
if "test ! -d ${XDG_CONFIG_HOME}/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ${XDG_CONFIG_HOME}/tmux/plugins/tpm && ${XDG_CONFIG_HOME}/tmux/plugins/tpm/bin/install_plugins'"

# init tmux plugin manager, kept at the very bottom of tmux.conf
run '${XDG_CONFIG_HOME}/tmux/plugins/tpm/tpm'
