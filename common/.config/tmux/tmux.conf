set -g default-shell "$SHELL"

set  -s default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ',xterm-ghostty:RGB,extkeys'

set -s extended-keys on


set -g status-keys emacs
set -g mode-keys   emacs

set  -g mouse             on
set  -g aggressive-resize off
set  -g clock-mode-style  24
set  -g history-limit     100000

set  -s escape-time       5

# Allow tmux copy-mode to update the outer terminal clipboard over OSC 52.
# Use 'external' rather than 'on' so programs inside panes cannot replace it.
set  -s set-clipboard     external

set  -g renumber-windows on
set  -g base-index       1
setw -g pane-base-index  1
set  -g automatic-rename on

set -g monitor-activity on

# Show messages for some time
set -g display-time 36000000

set -g prefix C-t
unbind C-b
bind-key C-t send-prefix

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window      -c "#{pane_current_path}"
bind-key , command-prompt -I "#W" "rename-window '%%'"
bind-key '$' command-prompt -I "#S" "rename-session '%%'"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key H previous-window
bind-key L next-window
unbind t
bind-key t choose-tree -Zw

bind-key -r Left  resize-pane -L 5
bind-key -r Down  resize-pane -D 5
bind-key -r Up    resize-pane -U 5
bind-key -r Right resize-pane -R 5

unbind '"'
unbind %

bind-key [ copy-mode
bind-key P paste-buffer

set -g status-interval 5  # 'status-left' and 'status-right' refresh interval
set -g focus-events on

set -ag update-environment "SSH_TTY"

# Keep a stable agent socket across detached SSH clients. On attach, tmux first
# imports the new client's SSH_AUTH_SOCK, then this hook repoints the stable
# socket used by panes and future windows.
set-hook -g client-attached \
  "run-shell '${HOME}/.local/bin/tmux-refresh-ssh-agent'"
run-shell "${HOME}/.local/bin/tmux-refresh-ssh-agent"

# Copy selections to the system clipboard over OSC 52 without leaving copy-mode.
# Mouse release clears the selection without leaving copy-mode.
bind-key   -T copy-mode    M-w               send-keys -X copy-selection
bind-key   -T copy-mode    C-w               send-keys -X copy-selection
bind-key   -T copy-mode    y                 send-keys -X copy-selection
bind-key   -T copy-mode    C-Left            send-keys -X previous-word
bind-key   -T copy-mode    C-Right           send-keys -X next-word-end
bind-key   -T copy-mode    MouseDragEnd1Pane send-keys -X clear-selection

bind-key   -T copy-mode-vi Enter             send-keys -X copy-selection
bind-key   -T copy-mode-vi y                 send-keys -X copy-selection
bind-key   -T copy-mode-vi MouseDragEnd1Pane send-keys -X clear-selection

# Configure native copy-mode scrolling without a mouse plugin.
set -g @scroll-lines-per-wheel '3'
bind-key -T copy-mode    WheelUpPane   send-keys -X -N '#{@scroll-lines-per-wheel}' scroll-up
bind-key -T copy-mode    WheelDownPane send-keys -X -N '#{@scroll-lines-per-wheel}' scroll-down
bind-key -T copy-mode-vi WheelUpPane   send-keys -X -N '#{@scroll-lines-per-wheel}' scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N '#{@scroll-lines-per-wheel}' scroll-down

bind-key R if-shell "test -f ${XDG_CONFIG_HOME}/tmux/tmux.conf" \
             "source-file ${XDG_CONFIG_HOME}/tmux/tmux.conf \; display-message 'Config reloaded!'" \
                 "display-message 'Error: Config file not found!'"

# tmux plugins / TPM

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_CONFIG_HOME/tmux/plugins"
run 'mkdir -p ${XDG_CONFIG_HOME}/tmux/plugins'
# # $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/install_plugins
# # $XDG_CONFIG_HOME/tmux/plugins/tpm/bin/update_plugins all

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'sainnhe/tmux-fzf'
set-environment -g TMUX_FZF_PREVIEW 0
set-environment -g TMUX_FZF_PREVIEW_FOLLOW 0
set-environment -g TMUX_FZF_OPTIONS "-p -w 60% -h 45% --no-border --no-info --no-scrollbar"
set-environment -g TMUX_FZF_LAUNCH_KEY f
bind-key F find-window

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

# set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @yank_action 'copy-pipe'
# set -g @yank_with_mouse off

# tmuxplugin-catppuccin
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# tmuxplugin-resurrect
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '$HOME/.local/state/tmux/resurrect'
run 'mkdir -p ${HOME}/.local/state/tmux/resurrect'

# sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# set -g @continuum-restore 'on'
# set -g @continuum-boot 'off'
# set -g @continuum-save-interval '30'

# https://github.com/tmux-plugins/tpm/blob/master/docs/automatic_tpm_installation.md
if "test ! -d ${XDG_CONFIG_HOME}/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ${XDG_CONFIG_HOME}/tmux/plugins/tpm && ${XDG_CONFIG_HOME}/tmux/plugins/tpm/bin/install_plugins'"

# init tmux plugin manager, kept at the very bottom of tmux.conf
run '${XDG_CONFIG_HOME}/tmux/plugins/tpm/tpm'
